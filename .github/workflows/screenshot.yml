name: Update Portfolio Screenshot

on:
  schedule:
    - cron: '0 0 * * 0'   # every Sunday midnight
  workflow_dispatch:       # run manually anytime

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Node & Puppeteer
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install puppeteer

      - name: Take screenshot
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 720 });
            await page.goto('https://ankush610.netlify.app/', {
              waitUntil: 'networkidle2',
              timeout: 30000
            });
            await new Promise(r => setTimeout(r, 3000)); // wait for animations
            await page.screenshot({ path: 'portfolio-preview.png', fullPage: false });
            await browser.close();
            console.log('Screenshot saved!');
          })();
          "

      - name: Commit & push screenshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolio-preview.png
          git diff --staged --quiet || git commit -m "chore: update portfolio screenshot"
          git push